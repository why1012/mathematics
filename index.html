<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 금고 해킹 터미널 (13단계)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --bg-color: #050a0f;
            --text-color: #00ff41;
            --border-color: #008f11;
            --alert-color: #ff003c;
            --panel-bg: rgba(0, 255, 65, 0.05);
            --hint-color: #ffea00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans KR', 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 850px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            overflow: hidden;
            position: relative;
        }

        .terminal-header {
            background: var(--border-color);
            color: #000;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
        }

        .progress-bar {
            background: #111;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2em;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        .content-area {
            padding: 30px 40px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }

        h2#stage-title {
            margin-top: 0;
            font-size: 1.6em;
            border-bottom: 1px dashed var(--text-color);
            padding-bottom: 10px;
            color: #fff;
        }

        p#stage-desc {
            font-size: 1.2em;
            line-height: 1.7;
            white-space: pre-line;
            margin-bottom: 20px;
            flex-grow: 1;
            font-family: 'Share Tech Mono', 'Noto Sans KR', monospace;
        }

        .hint-box {
            display: none;
            background: rgba(255, 234, 0, 0.1);
            border: 1px dashed var(--hint-color);
            color: var(--hint-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            animation: fadeIn 0.5s;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            font-size: 1.5em;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            outline: none;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        button {
            background: var(--border-color);
            color: #000;
            border: none;
            padding: 0 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        button:hover {
            background: var(--text-color);
            box-shadow: 0 0 15px var(--text-color);
        }

        .message {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 25px;
            text-align: center;
        }

        .error { color: var(--alert-color); animation: shake 0.4s; }
        .success { color: var(--text-color); }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        #victory-screen {
            display: none;
            text-align: center;
            padding: 50px 20px;
            animation: fadeIn 2s;
        }

        #victory-screen h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 0 0 20px var(--text-color);
            margin-bottom: 20px;
        }

        .time-record {
            font-size: 2em;
            color: var(--hint-color);
            margin: 30px 0;
            font-family: 'Share Tech Mono', monospace;
            border: 2px dashed var(--hint-color);
            padding: 15px;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="terminal-container" id="game-container">
        <div class="terminal-header">
            <span>> ROOT_ACCESS // 13_STAGE_PROTOCOL</span>
            <span>PLAY TIME : <span id="timer">00:00</span></span>
        </div>

        <div class="progress-bar" id="progress-bar">
            [□□□□□□□□□□□□□] 0/13
        </div>

        <div class="content-area" id="play-area">
            <h2 id="stage-title">로딩 중...</h2>
            <p id="stage-desc">데이터를 불러오는 중입니다.</p>
            
            <div id="hint-box" class="hint-box">
                <strong>[SYSTEM HINT]</strong> <span id="hint-text"></span>
            </div>
            
            <div class="input-group">
                <input type="text" id="answer-input" placeholder="정답 입력" autocomplete="off">
                <button onclick="checkAnswer()">해제 (ENTER)</button>
            </div>
            <div id="status-message" class="message"></div>
        </div>

        <div id="victory-screen">
            <h1>SYSTEM UNLOCKED</h1>
            <p style="font-size: 1.5em; line-height: 1.6; color: var(--text-color);">
                모든 방어벽이 무너졌습니다.<br>
                당신의 수학적 직관과 끈기가 승리했습니다!
            </p>
            <div class="time-record">
                CLEAR TIME : <span id="final-time">00:00</span>
            </div>
            <p style="font-size: 1.2em; color: #aaa;">> 스크린샷을 찍어 선생님께 결과를 보고하세요.</p>
        </div>
    </div>

    <script>
        const stages = [
            {
                title: "STAGE 01 : 숨겨진 수식",
                desc: "시스템 접근을 위한 첫 번째 인증 절차입니다.\n각 문자에 부여된 고유의 일련번호를 해독하여 다음 수식의 결괏값을 도출하십시오.\n\n[ D + O + G = 26 ]\n[ C + A + T = 24 ]\n\n[ M + A + T + H = ? ]",
                answer: "42",
                hint: "알파벳의 순서에 주목하세요. (A=1, B=2, C=3... Z=26)"
            },
            {
                title: "STAGE 02 : 카이사르의 톱니바퀴",
                desc: "암호화 톱니바퀴가 일정한 간격으로 어긋나 있습니다.\n입력과 출력의 패턴을 분석하여 손상된 데이터를 복구하십시오.\n\n[ F D W -> C A T ]\n[ G R J -> D O G ]\n\n복구할 데이터:\n[ K H O O R -> ? ]",
                answer: "HELLO",
                hint: "알파벳이 일정하게 밀려있습니다. K보다 3칸 '앞'에 있는 글자는 무엇일까요?"
            },
            {
                title: "STAGE 03 : 거울 차원의 통신",
                desc: "알파벳 체계가 정확히 반대로 뒤집힌 차원으로부터 메시지가 수신되었습니다.\n대칭의 원리를 이용해 해독하십시오.\n\n[ Z Y X -> A B C ]\n[ Y L B -> B O Y ]\n\n수신된 메시지:\n[ N Z G S -> ? ]",
                answer: "MATH",
                hint: "알파벳을 시작과 끝에서부터 거꾸로 짝지어 보세요. (Z=A, Y=B, X=C...)"
            },
            {
                title: "STAGE 04 : 시선의 이동",
                desc: "해답은 멀리 있지 않습니다.\n당신의 손끝과 시선이 머무는 곳, 바로 '키보드 자판'의 물리적 배열을 관찰하십시오.\n\n[ R -> T ]\n[ G -> H ]\n[ I -> O ]\n\n목표 단어:\n[ P [ R M -> ? ]",
                answer: "OPEN",
                hint: "키보드를 내려다보세요. 해당 키의 바로 '왼쪽'에 있는 키는 무엇인가요?"
            },
            {
                title: "STAGE 05 : 지그재그 데이터 스트림",
                desc: "데이터 패킷이 두 개의 라인으로 분산되어 전송되었습니다.\n단어를 지그재그로 분할한 뒤, 상단과 하단을 재조합하는 규칙을 찾아내십시오.\n\n[ M T A H -> M A T H ]\n[ A P E P L -> A P P L E ]\n\n재조합 대상:\n[ H C E A K R -> ? ]",
                answer: "HACKER",
                hint: "암호문을 절반으로 나누어 윗줄과 아랫줄에 적은 뒤, 위-아래 번갈아 가며 지그재그로 읽어보세요."
            },
            {
                title: "STAGE 06 : 혼돈 속의 질서",
                desc: "시스템 오류로 알파벳의 배열이 무작위로 섞여버렸습니다.\n문자들의 원형을 유추하여 올바른 '숫자' 영단어를 입력하십시오.\n\n[ E T N -> T E N ]\n[ W O T -> T W O ]\n\n오류 데이터:\n[ O Z E R -> ? ]",
                answer: "ZERO",
                hint: "순서가 뒤죽박죽입니다. 이리저리 조합하여 뜻이 있는 영어 숫자를 만들어보세요."
            },
            {
                title: "STAGE 07 : 해커의 선전포고",
                desc: "알 수 없는 발신자로부터 기괴한 경고문이 도착했습니다.\n텍스트 더미 속에 숨겨진 5글자의 핵심 키워드를 찾아내십시오.\n\n소리 없이 다가온 시스템의 붕괴.\n인류가 쌓아온 모든 암호 체계가\n수많은 해커들의 공격에 노출되었다.\n분석과 해독을 통해 방어막을 재구축하라.\n해답은 오직 수학의 섭리 안에 있다.",
                answer: "소인수분해",
                hint: "각 문장의 가장 첫 번째 글자들만 세로로 이어서 읽어보세요."
            },
            {
                title: "STAGE 08 : 특별한 위치",
                desc: "수많은 더미(Dummy) 데이터 속에 진짜 메시지가 흩어져 있습니다.\n'가장 고립된 숫자'들의 위치에 주목하십시오.\n\n[ A B C D E F G H I -> B C E G ]\n\n추출 대상:\n[ A S O B L C V D E F E -> ? ]",
                answer: "SOLVE",
                hint: "알파벳의 위치가 2번째, 3번째, 5번째, 7번째, 11번째... 즉 '소수(Prime)' 자리에 있는 글자만 뽑아보세요."
            },
            {
                title: "STAGE 09 : 자연의 번식 알고리즘",
                desc: "이 수열은 단순한 숫자의 나열이 아닌, 자연계의 성장 알고리즘입니다.\n생장의 규칙을 찾아 다음 세대를 예측하십시오.\n\n[ 2, 4, 6, 10, 16, 26 ]\n\n예측 대상:\n[ 1, 1, 2, 3, 5, 8, ? ]",
                answer: "13",
                hint: "바로 앞의 두 숫자를 더해보세요. 다음 숫자를 예측할 수 있습니다."
            },
            {
                title: "STAGE 10 : 약수 추출기",
                desc: "좌측의 값은 원래의 수, 우측의 값은 그 수를 구성하는 '특정 요소의 총개수'를 의미합니다.\n\n[ 10 -> 4 ]\n[ 20 -> 6 ]\n[ 25 -> 3 ]\n\n분석 대상:\n[ 100 -> ? ]",
                answer: "9",
                hint: "왼쪽 숫자의 '약수의 개수'가 바로 오른쪽 숫자입니다. 100의 약수는 모두 몇 개인가요?"
            },
            {
                title: "STAGE 11 : 죽음의 원 순열 (요세푸스 딜레마)",
                desc: "군사들이 원형으로 둘러서서 1번부터 시작해 자기 옆에 있는 2번째 사람을 차례로 제거하는 시뮬레이션입니다.\n\n[ 2명일 때 -> 1번 생존 ]\n[ 3명일 때 -> 3번 생존 ]\n[ 4명일 때 -> 1번 생존 ]\n[ 5명일 때 -> 3번 생존 ]\n\n최종 시뮬레이션:\n[ 32명일 때 -> ?번 생존 ]",
                answer: "1",
                hint: "사람 수가 '2의 거듭제곱(2, 4, 8, 16, 32...)'일 때는 규칙상 무조건 1번(첫 번째 사람)이 살아남습니다."
            },
            {
                title: "STAGE 12 : 논리의 거울",
                desc: "시스템이 당신의 고정관념을 테스트하고 있습니다.\n수식의 결괏값에 집착하지 말고, 명제의 참과 거짓을 있는 그대로 바라보십시오.\n\n[ 1 = 5 ]\n[ 2 = 25 ]\n[ 3 = 125 ]\n[ 4 = 625 ]\n\n질문:\n[ 5 = ? ]",
                answer: "1",
                hint: "계산하려 하지 말고 가장 첫 줄을 다시 읽어보세요. '1'이 5라면, 당연히 5는?"
            },
            {
                title: "FINAL BOSS : 최후의 방패",
                desc: "마침내 코어 시스템에 도달했습니다.\n이 암호는 무작위가 아닌 두 '소수(Prime Number)'의 곱으로 얽혀 있습니다.\n원래의 수에서 두 소수를 분리해내어, 크기가 작은 순서대로 이어 붙이십시오.\n\n[ 15 -> 35 ]\n[ 21 -> 37 ]\n[ 33 -> 311 ]\n[ 143 -> 1113 ]\n\n최종 암호 해제:\n[ 7387 -> ? ]",
                answer: "8389",
                hint: "왼쪽 수를 소인수분해하여 두 소수를 찾아 그대로 붙여 쓴 것입니다. (15 = 3x5). 7387을 두 소수로 쪼개보세요. (힌트: 80대의 소수들입니다)"
            }
        ];

        let currentStage = 0;
        let gameStartTime = 0;
        let timerInterval;
        let hintTimeout;

        function initGame() {
            gameStartTime = Date.now();
            timerInterval = setInterval(() => {
                let diff = Math.floor((Date.now() - gameStartTime) / 1000);
                let m = String(Math.floor(diff / 60)).padStart(2, '0');
                let s = String(diff % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
            loadStage();
        }

        function loadStage() {
            if (currentStage >= stages.length) {
                showVictory();
                return;
            }

            document.getElementById('stage-title').innerText = stages[currentStage].title;
            document.getElementById('stage-desc').innerText = stages[currentStage].desc;
            document.getElementById('answer-input').value = '';
            document.getElementById('status-message').innerText = '';
            document.getElementById('status-message').className = 'message';
            
            let progressStr = "[";
            for(let i=0; i<stages.length; i++) {
                progressStr += (i < currentStage) ? "■" : "□";
            }
            progressStr += `] ${currentStage}/${stages.length}`;
            document.getElementById('progress-bar').innerText = progressStr;

            document.getElementById('answer-input').focus();

            clearTimeout(hintTimeout);
            document.getElementById('hint-box').style.display = 'none';
            
            hintTimeout = setTimeout(() => {
                document.getElementById('hint-text').innerText = stages[currentStage].hint;
                document.getElementById('hint-box').style.display = 'block';
            }, 60000);
        }

        function checkAnswer() {
            const inputEl = document.getElementById('answer-input');
            const msgEl = document.getElementById('status-message');
            const userAnswer = inputEl.value.replace(/\s+/g, '').toUpperCase();
            
            const correctAnswer = stages[currentStage].answer.replace(/\s+/g, '').toUpperCase();

            if (userAnswer === correctAnswer) {
                msgEl.innerText = "ACCESS GRANTED : 보안 해제 완료.";
                msgEl.className = "message success";
                currentStage++;
                clearTimeout(hintTimeout);
                setTimeout(loadStage, 1000);
            } else {
                msgEl.innerText = "ACCESS DENIED : 비밀번호가 일치하지 않습니다.";
                msgEl.className = "message error";
                inputEl.value = '';
                inputEl.focus();
                
                msgEl.style.animation = 'none';
                msgEl.offsetHeight; 
                msgEl.style.animation = null;
            }
        }

        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });

        function showVictory() {
            clearInterval(timerInterval);
            clearTimeout(hintTimeout);
            
            let diff = Math.floor((Date.now() - gameStartTime) / 1000);
            let m = Math.floor(diff / 60);
            let s = diff % 60;
            document.getElementById('final-time').innerText = `${m}분 ${s}초`;

            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('play-area').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'block';
        }

        window.onload = initGame;
    </script>
</body>
</html>
