<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 금고 해킹 터미널 (15단계)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --bg-color: #050a0f;
            --text-color: #00ff41;
            --border-color: #008f11;
            --alert-color: #ff003c;
            --panel-bg: rgba(0, 255, 65, 0.05);
            --hint-color: #ffea00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans KR', 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 800px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            overflow: hidden;
            position: relative;
        }

        .terminal-header {
            background: var(--border-color);
            color: #000;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
        }

        .progress-bar {
            background: #111;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2em;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        .content-area {
            padding: 30px 40px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        h2#stage-title {
            margin-top: 0;
            font-size: 1.6em;
            border-bottom: 1px dashed var(--text-color);
            padding-bottom: 10px;
        }

        p#stage-desc {
            font-size: 1.2em;
            line-height: 1.6;
            white-space: pre-line;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .hint-box {
            display: none;
            background: rgba(255, 234, 0, 0.1);
            border: 1px dashed var(--hint-color);
            color: var(--hint-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            animation: fadeIn 0.5s;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: #111;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            font-size: 1.5em;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            outline: none;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        button {
            background: var(--border-color);
            color: #000;
            border: none;
            padding: 0 30px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        button:hover {
            background: var(--text-color);
            box-shadow: 0 0 15px var(--text-color);
        }

        .message {
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
            min-height: 25px;
            text-align: center;
        }

        .error { color: var(--alert-color); animation: shake 0.4s; }
        .success { color: var(--text-color); }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        /* 최종 성공 화면 */
        #victory-screen {
            display: none;
            text-align: center;
            padding: 50px 20px;
            animation: fadeIn 2s;
        }

        #victory-screen h1 {
            font-size: 3em;
            color: #fff;
            text-shadow: 0 0 20px var(--text-color);
            margin-bottom: 20px;
        }

        .time-record {
            font-size: 2em;
            color: var(--hint-color);
            margin: 30px 0;
            font-family: 'Share Tech Mono', monospace;
            border: 2px dashed var(--hint-color);
            padding: 15px;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="terminal-container" id="game-container">
        <div class="terminal-header">
            <span>> ROOT_ACCESS // 15_STAGE_PROTOCOL</span>
            <span>PLAY TIME : <span id="timer">00:00</span></span>
        </div>

        <div class="progress-bar" id="progress-bar">
            [□□□□□□□□□□□□□□□] 0/15
        </div>

        <div class="content-area" id="play-area">
            <h2 id="stage-title">로딩 중...</h2>
            <p id="stage-desc">데이터를 불러오는 중입니다.</p>
            
            <div id="hint-box" class="hint-box">
                <strong>[SYSTEM HINT]</strong> <span id="hint-text"></span>
            </div>
            
            <div class="input-group">
                <input type="text" id="answer-input" placeholder="정답 입력" autocomplete="off">
                <button onclick="checkAnswer()">해제 (ENTER)</button>
            </div>
            <div id="status-message" class="message"></div>
        </div>

        <div id="victory-screen">
            <h1>SYSTEM UNLOCKED</h1>
            <p style="font-size: 1.5em; line-height: 1.6; color: var(--text-color);">
                모든 방어벽이 무너졌습니다.<br>
                당신의 수학적 직관과 끈기가 승리했습니다!
            </p>
            <div class="time-record">
                CLEAR TIME : <span id="final-time">00:00</span>
            </div>
            <p style="font-size: 1.2em; color: #aaa;">> 스크린샷을 찍어 선생님께 결과를 보고하세요.</p>
        </div>
    </div>

    <script>
        // 스테이지 데이터 (총 15단계)
        const stages = [
            {
                title: "STAGE 01 : 알파벳의 숫자화 (A1-Z26)",
                desc: "기본적인 치환 암호다. A=1, B=2, C=3 ... Z=26 이다.\n\n해커의 첫 번째 암호 합계를 구하라.\n[ M + A + T + H = ? ]",
                answer: "42",
                hint: "M은 13번째, A는 1번째, T는 20번째, H는 8번째 알파벳입니다. 모두 더하세요."
            },
            {
                title: "STAGE 02 : 고대 로마의 유산 (시저 암호)",
                desc: "카이사르가 쓰던 방식이다. 알파벳이 일정 칸 수만큼 밀려 있다.\n의미가 있는 영단어를 찾아라.\n\n암호문 : [ KHOOR ]",
                answer: "HELLO",
                hint: "모든 알파벳을 알파벳 순서상 '3칸 앞'으로 당겨서 읽어보세요. (K -> H)"
            },
            {
                title: "STAGE 03 : 거울의 방 (아트바쉬 암호)",
                desc: "A는 Z로, B는 Y로... 알파벳을 완벽히 반대로 뒤집은 암호다.\n\n암호문 : [ NZGS ]",
                answer: "MATH",
                hint: "알파벳을 거꾸로 매칭하세요. N의 반대편은 M, Z의 반대편은 A입니다."
            },
            {
                title: "STAGE 04 : 시선의 이동 (키보드 암호)",
                desc: "암호는 당신의 눈앞에 있다. \n컴퓨터 키보드 자판을 유심히 보라.\n\n암호문 : [ P [ R M ]",
                answer: "OPEN",
                hint: "키보드에서 해당 글자의 바로 '왼쪽'에 있는 키를 쳐보세요. (P의 왼쪽은 O)"
            },
            {
                title: "STAGE 05 : 지그재그의 함정 (레일 펜스 암호)",
                desc: "글자를 지그재그 두 줄로 적은 뒤, 윗줄 먼저 읽고 아랫줄을 읽은 암호다.\n원래 단어를 복구하라.\n\n암호문 : [ H C E A K R ]",
                answer: "HACKER",
                hint: "첫 글자(H), 세 번째(C), 다섯 번째(E)가 윗줄이고, 두 번째(A), 네 번째(K), 여섯 번째(R)가 아랫줄입니다. 위아래로 번갈아 읽어보세요."
            },
            {
                title: "STAGE 06 : 혼돈 속의 질서 (애너그램)",
                desc: "알파벳의 순서가 무작위로 섞여 있다. 조합하여 수학 용어를 완성하라.\n\n암호문 : [ O Z E R ]",
                answer: "ZERO",
                hint: "숫자 0을 영어로 하면 무엇일까요?"
            },
            {
                title: "STAGE 07 : 빛과 소리의 대화 (모스 부호)",
                desc: "가장 클래식한 통신 암호다.\n\n암호문 : [ -.-. / --- / -.. / . ]\n\n(참고: C=-.-.  D=-..  E=.  O=---)",
                answer: "CODE",
                hint: "아래 참고에 적힌 알파벳과 모스 부호를 그대로 짝지어 보세요."
            },
            {
                title: "STAGE 08 : 숨겨진 세로줄 (어크로스틱 암호)",
                desc: "평범한 문장 속에 암호가 숨어 있다.\n\n[P]lease read carefully.\n[R]emember the rules.\n[I]nformation is hidden.\n[M]ake sure to check.\n[E]very single detail.",
                answer: "PRIME",
                hint: "각 문장의 가장 첫 번째 알파벳(대문자)들만 세로로 이어서 읽어보세요."
            },
            {
                title: "STAGE 09 : 감옥의 격자 (폴리비오스 암호)",
                desc: "1~5까지의 가로/세로 좌표로 글자를 찾는다.\n(11=A, 12=B... 34=O, 35=P, 15=E, 33=N)\n\n암호문 : [ 34 35 15 33 ]",
                answer: "OPEN",
                hint: "제시된 예시 괄호 안의 숫자와 알파벳을 그대로 매칭해보면 정답이 나옵니다."
            },
            {
                title: "STAGE 10 : 소수의 지목 (프라임 인덱스)",
                desc: "아무 의미 없는 알파벳 나열이다.\n하지만 '소수(Prime)' 번째 자리에 있는 글자만 뽑아내면 정답이 된다.\n\n암호문 : [ A S O B L C V D E F E ]",
                answer: "SOLVE",
                hint: "2번째(S), 3번째(O), 5번째(L), 7번째(V), 11번째(E) 알파벳을 합치세요."
            },
            {
                title: "STAGE 11 : 자연의 번식 (피보나치 수열)",
                desc: "수열의 다음 숫자를 예측하여 비밀번호를 풀어라.\n\n[ 1, 1, 2, 3, 5, 8, ? ]",
                answer: "13",
                hint: "앞의 두 숫자를 더하면 다음 숫자가 됩니다. (5 + 8 = ?)"
            },
            {
                title: "STAGE 12 : 수학적 사실",
                desc: "다음 수학 질문의 정답을 숫자로 입력하라.\n\n[ 100의 약수는 모두 몇 개인가? ]",
                answer: "9",
                hint: "100 = 2^2 × 5^2 입니다. 지수에 1씩 더해서 곱해보세요. (3 × 3)"
            },
            {
                title: "STAGE 13 : 죽음의 원 순열 (요세푸스)",
                desc: "32명의 사람이 원형으로 서 있다.\n1번부터 시작해 자기 옆에 있는 2번째 사람을 차례대로 제거한다.\n마지막까지 살아남는 사람의 번호는 몇 번인가?",
                answer: "1",
                hint: "사람 수가 '2의 거듭제곱(2, 4, 8, 16, 32...)'일 때는 무조건 첫 번째 사람이 살아남습니다."
            },
            {
                title: "STAGE 14 : 논리의 함정",
                desc: "억지 같지만 완벽한 논리가 있다.\n\n1 = 5\n2 = 25\n3 = 125\n4 = 625\n그렇다면, 5 = ?",
                answer: "1",
                hint: "가장 첫 줄을 다시 읽어보세요. 1이 5라면, 당연히 5는 1입니다."
            },
            {
                title: "FINAL BOSS : 소인수분해의 방패 (RSA 암호)",
                desc: "드디어 핵심 금고에 도달했다. 금고는 '7387' 이라는 거대한 숫자로 잠겨 있다.\n이 숫자는 슈퍼컴퓨터로도 풀기 힘든 두 '소수(Prime)'의 곱이다.\n\n두 소수를 찾아내어, 작은 소수와 큰 소수를 차례대로 이어 붙인 4자리 숫자를 입력하라.",
                answer: "8389",
                hint: "루트 7387은 대략 85.9입니다. 85 근처에 있는 소수(79, 83, 89)들을 서로 곱해보세요!"
            }
        ];

        let currentStage = 0;
        let gameStartTime = 0;
        let timerInterval;
        let hintTimeout;

        // 게임 초기화
        function initGame() {
            gameStartTime = Date.now();
            
            // 타이머 시작
            timerInterval = setInterval(() => {
                let diff = Math.floor((Date.now() - gameStartTime) / 1000);
                let m = String(Math.floor(diff / 60)).padStart(2, '0');
                let s = String(diff % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);

            loadStage();
        }

        // 스테이지 로딩
        function loadStage() {
            if (currentStage >= stages.length) {
                showVictory();
                return;
            }

            // UI 업데이트
            document.getElementById('stage-title').innerText = stages[currentStage].title;
            document.getElementById('stage-desc').innerText = stages[currentStage].desc;
            document.getElementById('answer-input').value = '';
            document.getElementById('status-message').innerText = '';
            document.getElementById('status-message').className = 'message';
            
            // 진행도 바 업데이트
            let progressStr = "[";
            for(let i=0; i<stages.length; i++) {
                progressStr += (i < currentStage) ? "■" : "□";
            }
            progressStr += `] ${currentStage}/${stages.length}`;
            document.getElementById('progress-bar').innerText = progressStr;

            document.getElementById('answer-input').focus();

            // 힌트 시스템 초기화 (1분 뒤 자동 표시)
            clearTimeout(hintTimeout);
            document.getElementById('hint-box').style.display = 'none';
            
            hintTimeout = setTimeout(() => {
                document.getElementById('hint-text').innerText = stages[currentStage].hint;
                document.getElementById('hint-box').style.display = 'block';
            }, 60000); // 60000ms = 1분
        }

        // 정답 확인
        function checkAnswer() {
            const inputEl = document.getElementById('answer-input');
            const msgEl = document.getElementById('status-message');
            // 여백 제거 및 대문자 변환
            const userAnswer = inputEl.value.replace(/\s+/g, '').toUpperCase();
            const correctAnswer = stages[currentStage].answer.toUpperCase();

            if (userAnswer === correctAnswer) {
                msgEl.innerText = "ACCESS GRANTED : 보안 해제 완료.";
                msgEl.className = "message success";
                currentStage++;
                clearTimeout(hintTimeout); // 정답 맞추면 힌트 타이머 정지
                
                setTimeout(loadStage, 1000); // 1초 뒤 다음 스테이지
            } else {
                msgEl.innerText = "ACCESS DENIED : 비밀번호가 일치하지 않습니다.";
                msgEl.className = "message error";
                inputEl.value = '';
                inputEl.focus();
                
                // 에러 애니메이션 재시작
                msgEl.style.animation = 'none';
                msgEl.offsetHeight; 
                msgEl.style.animation = null;
            }
        }

        // 엔터키 입력 지원
        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 최종 성공 화면
        function showVictory() {
            clearInterval(timerInterval);
            clearTimeout(hintTimeout);
            
            let diff = Math.floor((Date.now() - gameStartTime) / 1000);
            let m = Math.floor(diff / 60);
            let s = diff % 60;
            document.getElementById('final-time').innerText = `${m}분 ${s}초`;

            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('play-area').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'block';
        }

        // 창이 로드되면 게임 시작
        window.onload = initGame;
    </script>
</body>
</html>
